name: Deploy to Staging (cPanel)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: Staging
      url: https://staging.npmariahospital.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite)
        env:
          VITE_SITE_URL: "https://staging.npmariahospital.com"
        run: pnpm run build:staging

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.STAGING_PORT }}" "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ to cPanel docroot
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.STAGING_PORT }}" \
            --exclude '.well-known' \
            --exclude 'cgi-bin' \
            --exclude 'cp_errordocument.shtml' \
            --exclude 'images' \
            dist/ \
            "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PATH }}/"